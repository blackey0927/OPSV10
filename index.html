// OPS 系統專屬主金鑰（與 Prompt_V7_6 不同，密碼互不通用）
const _k = () => ["36","53","6f","6a","5a","37","30","39","32","26"].map(x=>String.fromCharCode(parseInt(x,16))).join('');

window.addEventListener('DOMContentLoaded', () => {
  if (window.OPS_DB && Object.keys(window.OPS_DB).length > 0) {
    document.getElementById('lock-ui').style.display = 'none';
    document.getElementById('ops-app-root').style.display = 'block';

    return;
  }

  const savedPw = localStorage.getItem('ops_user_pw');
  if (savedEmail && savedPw) {
    document.getElementById('u-email').value = savedEmail;
    document.getElementById('u-pw').value = savedPw;
    doUnlock(true);
  }
});

function switchTab(t) {
  document.getElementById('panel-unlock').style.display = t === 'unlock' ? 'block' : 'none';
  document.getElementById('panel-req').style.display = t === 'req' ? 'block' : 'none';
  document.getElementById('tab-u').className = t === 'unlock' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('tab-r').className = t === 'req' ? 'tab-btn active' : 'tab-btn';
}

function sendReq() {
  const email = document.getElementById('r-email').value;
  const name = document.getElementById('r-name').value;
  if(!email.includes('@')) return alert('Please enter a valid email address');
  fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email: email, name: name, message: "OPS System Access Request" })
  }).then(() => alert("✅ Request submitted! Please wait for your password."));
}

function b64ToBytes(b64){
  const bin = atob(b64); const b = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) b[i] = bin.charCodeAt(i); return b;
}

async function doUnlock(isAutoLogin = false) {
  const email = document.getElementById('u-email').value.trim().toLowerCase();
  const pw = document.getElementById('u-pw').value.trim().toUpperCase();
  const btn = document.getElementById('unlock-btn');
  if(!email || !pw) return !isAutoLogin && alert("Please fill in all fields!");

  btn.innerText = "Verifying..."; btn.disabled = true;

  try {
    const enc = new TextEncoder();
    const keyMatHMAC = await crypto.subtle.importKey('raw', enc.encode(_k()), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', keyMatHMAC, enc.encode(email));
    const expected = Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,10).toUpperCase();
    
    if(pw !== expected) { 
      btn.innerText = "Unlock & Enter"; btn.disabled = false; 
      localStorage.removeItem('ops_user_pw'); 
      return !isAutoLogin && alert("❌ Incorrect email or password!"); 
    }

    const response = await fetch('./database_secured.txt');
    if(!response.ok) throw new Error("Encrypted database not found");
    const encryptedData = await response.json();

    const salt = b64ToBytes(encryptedData.salt);
    const nonce = b64ToBytes(encryptedData.nonce);
    const ct = b64ToBytes(encryptedData.ct);
    
    const keyMatAES = await crypto.subtle.importKey('raw', enc.encode(_k()), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:310000, hash:'SHA-256'}, keyMatAES, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, key, ct);
    const dbScriptText = new TextDecoder().decode(decrypted);
    
    const scriptEl = document.createElement('script');
    scriptEl.textContent = dbScriptText;
    document.body.appendChild(scriptEl);

    localStorage.setItem('ops_user_email', email);
    localStorage.setItem('ops_user_pw', pw);

    // ── Airtable 追蹤記錄（靜默執行）──
    (async () => {
      try {
        const AT = window._OPS_AT_CONFIG;
        if(!AT || !AT.token || !AT.baseId || AT.token === 'YOUR_AIRTABLE_PAT') return;
        const base = `https://api.airtable.com/v0/${AT.baseId}`;
        const hdr  = { 'Authorization':`Bearer ${AT.token}`, 'Content-Type':'application/json' };
        const now  = new Date().toISOString();
        const dev  = navigator.userAgent.split(' ').slice(-3).join(' ');
        await fetch(`${base}/unlock_logs`, {
          method:'POST', headers: hdr,
          body: JSON.stringify({ fields:{ email, unlocked_at: now, device: dev, system: 'OPS' } })
        });
        const search = await fetch(`${base}/authorized_users?filterByFormula=${encodeURIComponent(`{email}="${email}"`)}`, { headers: hdr });
        const data = await search.json();
        if(data.records?.length > 0){
          const rec = data.records[0];
          await fetch(`${base}/authorized_users/${rec.id}`, {
            method:'PATCH', headers: hdr,
            body: JSON.stringify({ fields:{ use_count: (rec.fields.use_count||0)+1, last_use: now }})
          });
        }
      } catch(e){ /* 靜默失敗 */ }
    })();

    document.getElementById('lock-ui').style.display = 'none';
    document.getElementById('ops-app-root').style.display = 'block';
    
    if(window.launchOPSApp) window.launchOPSApp();

  } catch(e) {
    console.error(e);
    btn.innerText = "Unlock & Enter"; btn.disabled = false;
    if(!isAutoLogin) alert("❌ Decryption failed! Please check if the database file has been uploaded to GitHub.");
  }
}

    // ── Gemini API 呼叫輔助（智慧模型降級 + 自動重試）──
    // 模型策略：2.5-flash (10RPM/500RPD) → 429時自動降級 → 2.5-flash-lite (15RPM/1000RPD)
    // gemini-2.0-flash 已於2026年起棄用，此版本使用最新 2.5 系列
    async function callGeminiWithRetry(apiKey, prompt, maxTokens) {
      const models = ["gemini-2.5-flash", "gemini-2.5-flash-lite"];
      const BASE = "https://generativelanguage.googleapis.com/v1beta/models/";
      const body = JSON.stringify({
        contents:[{parts:[{text: prompt}]}],
        generationConfig:{temperature:0.3, maxOutputTokens:(maxTokens||2048)},
        safetySettings:[
          {category:"HARM_CATEGORY_HARASSMENT",threshold:"BLOCK_NONE"},
          {category:"HARM_CATEGORY_HATE_SPEECH",threshold:"BLOCK_NONE"},
          {category:"HARM_CATEGORY_SEXUALLY_EXPLICIT",threshold:"BLOCK_ONLY_HIGH"},
          {category:"HARM_CATEGORY_DANGEROUS_CONTENT",threshold:"BLOCK_NONE"}
        ]
      });
      for (let mi = 0; mi < models.length; mi++) {
        const model = models[mi];
        const url = BASE + model + ":generateContent?key=" + apiKey;
        for (let attempt = 1; attempt <= 3; attempt++) {
          const res = await fetch(url, {method:"POST", headers:{"Content-Type":"application/json"}, body});
          if (res.ok) {
            const json = await res.json();
            const text = json.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
            if (!text) {
              // 嘗試從 finishReason 判斷原因
              const reason = json.candidates?.[0]?.finishReason || "UNKNOWN";
              const blocked = json.promptFeedback?.blockReason;
              if (blocked) throw new Error("Content blocked by safety filter: " + blocked + "\nTry removing sensitive descriptions from your prompt.");
              if (mi < models.length - 1) break; // try fallback model
              throw new Error("Empty response (finishReason: " + reason + ")\nPlease retry or shorten your prompt.");
            }
            return text;
          }
          if (res.status === 429) {
            if (attempt < 3) {
              await new Promise(r => setTimeout(r, attempt * 4000));
              continue;
            }
            // 最後一次 429：若還有備用模型則降級，否則報錯
            if (mi < models.length - 1) break;
            throw new Error("429 - API rate limit reached.\nFree tier: Flash 10 req/min, Lite 15 req/min.\nWait ~1 minute or upgrade to a paid Google Cloud account.");
          }
          if (res.status === 400) throw new Error("400 - Invalid API Key or malformed request. Please verify your key at aistudio.google.com");
          if (res.status === 403) throw new Error("403 - API Key lacks permission. Please enable the Generative Language API.");
          throw new Error("API Error " + res.status);
        }
      }
    }

                            </div>
                            {/* 操作按鈕 */}
                            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                              <button onClick={()=>navigator.clipboard.writeText(scene)}
                                title={_lang==="zh"?"複製英文 Prompt":"Copy EN Prompt"}
                                style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"transparent",border:"1px solid #a78bfa55",color:"#a78bfa99"}}>
                                📋 EN
                              </button>
                              <button onClick={()=>translateScene(scene, i)}
                                disabled={translatingScene !== null}
                                title={_lang==="zh"?"翻譯此場景為中文":"Translate to ZH"}
                                style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,
                                  cursor:translatingScene===i?"wait":translatingScene!==null?"not-allowed":"pointer",
                                  background:sceneTranslations[i]?"rgba(34,211,238,0.18)":"rgba(34,211,238,0.08)",
                                  border:"1px solid #22d3ee"+(sceneTranslations[i]?"":"66"),
                                  color:sceneTranslations[i]?"#22d3ee":"#22d3ee88"}}>
                                {translatingScene===i ? "⏳" : uiLang==="zh"?"🌐 譯ZH":"🌐 Trans"}
                              </button>
                              {sceneTranslations[i] && (
                                <button onClick={()=>navigator.clipboard.writeText(sceneTranslations[i])}
                                  title={_lang==="zh"?"複製中文翻譯":"Copy ZH"}
                                  style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"rgba(34,211,238,0.12)",border:"1px solid #22d3ee",color:"#22d3ee"}}>
                                  📋 ZH
                                </button>
                              )}
                              <button onClick={()=>{
                                  window.__OPS_FILL_CUSTOM_PROMPT && window.__OPS_FILL_CUSTOM_PROMPT(scene);
                                  navigator.clipboard.writeText(scene);
                                }}
                                title={_lang==="zh"?"填入自訂欄送出算圖":"Fill Custom → Send"}
                                style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"rgba(167,139,250,0.18)",border:"1px solid #a78bfa",color:"#a78bfa"}}>
                                ✏️ Fill Custom
                              </button>
                            </div>
                          </div>
                          {/* Prompt 內文 */}
                          <div style={{padding:"12px 14px",fontSize:12,color:"var(--text)",fontFamily:"monospace",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{scene}</div>
                          {/* ZH Translation block */}
                          {sceneTranslations[i] && (
                            <div style={{padding:"10px 14px",background:"rgba(34,211,238,0.05)",borderTop:"1px solid #22d3ee22"}}>
                              <div style={{fontSize:10,color:"#22d3ee",fontWeight:700,marginBottom:5}}>🌐 ZH Translation</div>
                              <div style={{fontSize:12,color:"var(--text)",lineHeight:1.8,fontFamily:"sans-serif"}}>{sceneTranslations[i]}</div>
                            </div>
                          )}
                          {/* 直送按鈕列 */}
                          <div style={{padding:"8px 14px",background:"rgba(167,139,250,0.05)",borderTop:"1px solid #a78bfa18",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{fontSize:10,color:"#a78bfa77",marginRight:2}}>Send to Render:</span>
                            {isRunningHubMode && (
                              <button
                                onClick={()=>{ handleRunningHubSend(scene); }}
                                disabled={isComfyGenerating}
                                title={_lang==="zh"?"直接用此分鏡 Prompt 送至 RunningHub 算圖":"Send to RunningHub"}
                                style={{padding:"4px 14px",fontSize:11,fontWeight:700,borderRadius:6,cursor:isComfyGenerating?"not-allowed":"pointer",
                                  background:"rgba(201,168,76,0.15)",border:"1px solid #c9a84c",color:"#c9a84c"}}>
                                ⚡ RunningHub
                              </button>
                            )}
                            {!isRunningHubMode && !isCloudMode && (
                              <button
                                onClick={()=>{ handleComfySend(scene, ""); }}
                                disabled={isComfyGenerating}
                                title={_lang==="zh"?"直接用此分鏡 Prompt 送至本地 ComfyUI 算圖":"Send to ComfyUI"}
                                style={{padding:"4px 14px",fontSize:11,fontWeight:700,borderRadius:6,cursor:isComfyGenerating?"not-allowed":"pointer",
                                  background:"rgba(80,200,100,0.15)",border:"1px solid #50c070",color:"#50c070"}}>
                                🚀 ComfyUI
                              </button>
                            )}
                            {isCloudMode && (
                              <button
                                onClick={()=>{ handleCloudGenerate(scene); }}
                                title={_lang==="zh"?"直接用此分鏡 Prompt 送至 Gemini Imagen 算圖":"Send to Imagen"}
                                style={{padding:"4px 14px",fontSize:11,fontWeight:700,borderRadius:6,cursor:"pointer",
                                  background:"rgba(99,179,237,0.15)",border:"1px solid #63b3ed",color:"#63b3ed"}}>
                                ☁️ Imagen
                              </button>
                            )}
                            <span style={{fontSize:9,color:"#a78bfa44",marginLeft:"auto"}}>
                              {isComfyGenerating ? uiLang==="zh"?uiLang==="zh"?"⏳ 算圖中...":"⏳ Generating...":"⏳ Generating..." : uiLang==="zh"?"點擊直接生成此場景":"Click to generate"}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Flow 格式分鏡結果 */}
                  {storyboardResult.mode==="flow" && storyboardResult.scenes && (
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
                        <span style={{fontSize:12,color:"#a78bfa",fontWeight:700}}>🌊 Google Flow Storyboard — {storyboardResult.scenes.length} Shots</span>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={translateAllScenes} disabled={translatingScene!==null}
                            style={{padding:"3px 10px",fontSize:10,fontWeight:700,borderRadius:5,cursor:translatingScene!==null?"wait":"pointer",
                              background:"rgba(34,211,238,0.1)",border:"1px solid #22d3ee"+(translatingScene!==null?"":"88"),color:translatingScene!==null?"#22d3ee":"#22d3ee99"}}>
                            {translatingScene!==null?uiLang==="zh"?"⏳ 翻譯中...":"⏳ Translating...":uiLang==="zh"?"🌐 全部翻譯中文":"🌐 Translate All"}
                          </button>
                          <button onClick={()=>{
                              const all = storyboardResult.scenes.map((s,idx2)=>"[Scene "+(idx2+1)+"]\n"+s).join("\n\n");
                              navigator.clipboard.writeText(all);
                            }} style={{padding:"3px 10px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"rgba(167,139,250,0.15)",border:"1px solid #a78bfa",color:"#a78bfa"}}>
                            📋 Copy All
                          </button>
                          <button onClick={()=>window.open("https://flow.google","_blank")}
                            style={{padding:"3px 10px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"rgba(167,139,250,0.25)",border:"1px solid #a78bfa",color:"#a78bfa"}}>
                            🌊 Open Flow
                          </button>
                        </div>
                      </div>
                      {storyboardResult.scenes.map((scene,i)=>(
                        <div key={i} style={{border:"1px solid #a78bfa44",borderRadius:10,overflow:"hidden",marginBottom:12}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:"rgba(167,139,250,0.12)",borderBottom:"1px solid #a78bfa22"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontSize:12,color:"#a78bfa",fontWeight:700}}>🌊 Scene {i+1}</span>
                              <span style={{fontSize:10,color:"#a78bfa66"}}>/ {storyboardResult.scenes.length}</span>
                              {sceneTranslations[i] && <span style={{fontSize:9,color:"#22d3ee",background:"rgba(34,211,238,0.1)",padding:"1px 6px",borderRadius:4}}>ZH✓</span>}
                            </div>
                            <div style={{display:"flex",gap:5}}>
                              <button onClick={()=>translateScene(scene,i)} disabled={translatingScene!==null}
                                style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,cursor:translatingScene===i?"wait":"pointer",
                                  background:sceneTranslations[i]?"rgba(34,211,238,0.18)":"rgba(34,211,238,0.08)",
                                  border:"1px solid #22d3ee"+(sceneTranslations[i]?"":"66"),color:sceneTranslations[i]?"#22d3ee":"#22d3ee88"}}>
                                {translatingScene===i?"⏳":uiLang==="zh"?"🌐 譯ZH":"🌐 Trans"}
                              </button>
                              {sceneTranslations[i] && <button onClick={()=>navigator.clipboard.writeText(sceneTranslations[i])}
                                style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"rgba(34,211,238,0.12)",border:"1px solid #22d3ee",color:"#22d3ee"}}>📋 ZH</button>}
                              <button onClick={()=>navigator.clipboard.writeText(scene)}
                                style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"transparent",border:"1px solid #a78bfa55",color:"#a78bfa99"}}>📋 EN</button>
                              <button onClick={()=>{ navigator.clipboard.writeText(scene); window.open("https://flow.google","_blank"); }}
                                style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"rgba(167,139,250,0.25)",border:"1px solid #a78bfa",color:"#a78bfa"}}>
                                🌊 Copy+Flow
                              </button>
                            </div>
                          </div>
                          <div style={{padding:"12px 14px",fontSize:12,color:"var(--text)",lineHeight:1.9}}>{scene}</div>
                          {sceneTranslations[i] && (
                            <div style={{padding:"10px 14px",background:"rgba(34,211,238,0.05)",borderTop:"1px solid #22d3ee22"}}>
                              <div style={{fontSize:10,color:"#22d3ee",fontWeight:700,marginBottom:5}}>🌐 ZH Translation</div>
                              <div style={{fontSize:12,color:"var(--text)",lineHeight:1.8}}>{sceneTranslations[i]}</div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* 📚 提示詞歷史紀錄 */}            {/* 📚 提示詞歷史紀錄 */}
            <div style={{marginTop:10,border:"1px solid #c9a84c44",borderRadius:12,overflow:"hidden"}}>
              <div
                onClick={()=>setShowHistory(p=>!p)}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"rgba(201,168,76,0.07)",cursor:"pointer",userSelect:"none"}}
              >
                <span style={{color:"#c9a84c",fontWeight:"bold",fontSize:13,letterSpacing:1}}>{_lang==="zh"?"📚 提示詞歷史紀錄":"📚 Prompt History"}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:10,color:"#c9a84c88"}}>{promptHistory.length} entries</span>
                  <button onClick={e=>{e.stopPropagation();exportHistory();}} style={{padding:"2px 10px",fontSize:10,fontWeight:700,borderRadius:5,cursor:"pointer",background:"transparent",border:"1px solid #c9a84c66",color:"#c9a84c"}}>📥 CSV</button>
                  <span style={{color:"#c9a84c",fontSize:12,opacity:0.7}}>{showHistory?"▲":"▼"}</span>
                </div>
              </div>
              {showHistory && (
                <div style={{padding:12,background:"var(--card)"}}>
                  <input type="text" value={historySearch} onChange={e=>setHistorySearch(e.target.value)}
                    placeholder={uiLang==="zh"?"🔍 搜尋提示詞內容...":"🔍 Search history..."}
                    style={{width:"100%",padding:"7px 12px",background:"var(--inputBg)",border:"1px solid var(--border)",borderRadius:7,color:"var(--text)",fontSize:12,outline:"none",marginBottom:8,boxSizing:"border-box"}}
                  />
                  {promptHistory.length === 0
                    ? <div style={{color:"var(--subtext)",fontSize:11,padding:8}}>No records yet. Auto-saved after generation.</div>
                    : promptHistory
                        .filter(h => !historySearch || h.pos_en.toLowerCase().includes(historySearch.toLowerCase()) || h.pos_zh.includes(historySearch) || (h.name||"").includes(historySearch))
                        .map(h => (
                          <div key={h.id} style={{border:"1px solid var(--border)",borderRadius:8,padding:10,marginBottom:8,background:"var(--inputBg)"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,flexWrap:"wrap",gap:4}}>
                              <input
                                type="text" value={h.name||""}
                                onChange={e=>saveHistoryName(h.id, e.target.value)}
                                placeholder={_lang==="zh"?"📌 點擊命名... (":"📌 Click to name... (" + h.ts + ")"}
                                style={{flex:1,minWidth:120,padding:"3px 8px",background:"transparent",border:"1px solid var(--border)",borderRadius:5,color:"#c9a84c",fontSize:11,outline:"none"}}
                              />
                              <div style={{display:"flex",gap:5}}>
                                <button onClick={()=>{navigator.clipboard.writeText(h.pos_en);}} style={{padding:"2px 8px",fontSize:10,background:"transparent",border:"1px solid var(--border)",color:"var(--subtext)",borderRadius:5,cursor:"pointer"}}>📋 Copy EN</button>
                                <button onClick={()=>{window.__OPS_FILL_CUSTOM_PROMPT && window.__OPS_FILL_CUSTOM_PROMPT(h.pos_en);}} style={{padding:"2px 8px",fontSize:10,background:"rgba(201,168,76,0.15)",border:"1px solid #c9a84c66",color:"#c9a84c",borderRadius:5,cursor:"pointer"}}>→ Custom</button>
                                <button onClick={()=>deleteHistory(h.id)} style={{padding:"2px 8px",fontSize:10,background:"rgba(200,50,50,0.1)",border:"1px solid #f5554d44",color:"#f55",borderRadius:5,cursor:"pointer"}}>🗑</button>
                              </div>
                            </div>
                            <div style={{fontSize:11,color:"var(--subtext)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.pos_en.substring(0,120)}{h.pos_en.length>120?"...":""}</div>
                          </div>
                        ))
                  }
                </div>
              )}
            </div>

            {/* 🎨 算圖結果動態顯示區域 */}
            {(isComfyGenerating || comfyImages.length > 0) && (
              <div ref={comfyGalleryRef} style={{marginTop:24,padding:20,background:"var(--card)",border:`1px solid ${isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}`,borderRadius:12,boxShadow:`0 10px 30px ${isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}1A`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                  <span style={{fontSize:20}}>{isCloudMode?"☁️":isRunningHubMode?"⚡":"🎨"}</span>
                  <span style={{color:isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green,fontWeight:800,fontSize:15,letterSpacing:1}}>
                    {isCloudMode?uiLang==="zh"?"Google Imagen 3 雲端算圖引擎":"Google Cloud Engine":isRunningHubMode?uiLang==="zh"?"RunningHub Z-image 新王登基算圖引擎":"RunningHub Cloud Engine":uiLang==="zh"?"ComfyUI 本地即時算圖引擎":"ComfyUI Local Engine"}
                  </span>
                </div>
                {isComfyGenerating && (
                  <div style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,color:"var(--subtext)",marginBottom:8,fontWeight:"bold"}}>
                      <span style={{color:isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}}>
                        {isCloudMode?uiLang==="zh"?"⚡ 正在呼叫 Google API...":"⚡ Calling Google API...":isRunningHubMode?(rhQueueStatus||uiLang==="zh"?"⚡ 正在呼叫 RunningHub Z-image，每4秒輪詢...":"⚡ Calling RunningHub..."):uiLang==="zh"?"⚡ 正在與 RTX 5090 伺服器通訊...":"⚡ Connecting to ComfyUI..."}
                      </span>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span>{comfyProgress}%</span>
                        <button onClick={handleCancel} style={{padding:"3px 10px",fontSize:11,fontWeight:"bold",background:"rgba(220,50,50,0.15)",border:"1px solid #f55",color:"#f55",borderRadius:6,cursor:"pointer",lineHeight:1.4}}>✕ Cancel</button>
                      </div>
                    </div>
                    <div style={{width:"100%",height:8,background:`${isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}1A`,borderRadius:4,overflow:"hidden",border:`1px solid ${isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green}4D`}}>
                      <div style={{width:`${comfyProgress}%`,height:"100%",background:isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green,transition:"width 0.3s ease-out"}}></div>
                    </div>
                  </div>
                )}
                {comfyImages.length > 0 && (
                  <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:10}}>
                    {comfyImages.map((src, idx) => {
                      const ac = isCloudMode?C.cloud:isRunningHubMode?C.rhGold:C.green;
                      const isUrl = src.startsWith("http");
                      const fn = `OPS_Z-image_${new Date().toISOString().slice(0,10)}_${idx+1}.png`;

                      // 存檔：手機用 Web Share API，桌機用 a.download
                      const doSave = async (e) => {
                        const btn = e.currentTarget;
                        btn.textContent = _lang==="zh"?"⟳ 處理中...":"⟳ Processing..."; btn.disabled = true;
                        try {
                          // 先取得 blob
                          let blob;
                          if (isUrl) {
                            const res = await fetch(src);
                            if (!res.ok) throw new Error("fetch failed");
                            blob = await res.blob();
                          } else {
                            const b64 = src.split(",")[1];
                            const bin = atob(b64); const arr = new Uint8Array(bin.length);
                            for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
                            blob = new Blob([arr], {type:"image/png"});
                          }

                          const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

                          // 手機：優先用 Web Share API（直接存相簿）
                          if (isMobile && navigator.canShare) {
                            const file = new File([blob], fn, {type: "image/png"});
                            if (navigator.canShare({files:[file]})) {
                              await navigator.share({
                                files: [file],
                                title: uiLang==="zh"?"OPS 出圖":"OPS Output",
                              });
                              btn.textContent = _lang==="zh"?"✓ 已分享":"✓ Shared";
                              setTimeout(()=>{ btn.textContent = uiLang==="zh"?"⬇ 存圖":"⬇ Save"; btn.disabled = false; }, 2000);
                              return;
                            }
                          }

                          // 桌機 or 手機不支援 Share：用 a.download
                          const u = URL.createObjectURL(blob);
                          const a = document.createElement("a");
                          a.href = u; a.download = fn; a.click();
                          setTimeout(()=> URL.revokeObjectURL(u), 3000);
                          btn.textContent = uiLang==="zh"?"✓ 已存檔":"✓ Saved";
                          setTimeout(()=>{ btn.textContent = uiLang==="zh"?"⬇ 存圖":"⬇ Save"; btn.disabled = false; }, 2000);

                        } catch(err) {
                          // 最終 fallback：新分頁開啟長按存圖
                          window.open(src, "_blank");
                          btn.textContent = uiLang==="zh"?"⬇ 存圖":"⬇ Save";
                          btn.disabled = false;
                        }
                      };

                      // 複製圖片：fetch→blob→ClipboardItem，可直接 Ctrl+V 貼圖
                      const doCopy = async (e) => {
                        const btn = e.currentTarget;
                        btn.textContent = _lang==="zh"?"⟳ 複製中...":"⟳ Copying..."; btn.disabled = true;
                        try {
                          let blob;
                          if (isUrl) {
                            const res = await fetch(src);
                            if (!res.ok) throw new Error("fetch failed");
                            blob = await res.blob();
                          } else {
                            const b64 = src.split(",")[1];
                            const bin = atob(b64); const arr = new Uint8Array(bin.length);
                            for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
                            blob = new Blob([arr], {type:"image/png"});
                          }
                          await navigator.clipboard.write([new ClipboardItem({"image/png": blob})]);
                          setCopiedIdx(idx);
                          btn.textContent = uiLang==="zh"?"✓ 已複製圖片":"✓ Copied";
                          setTimeout(()=>{ setCopiedIdx(null); btn.textContent = uiLang==="zh"?"⎘ 複製圖片":"⎘ Copy Img"; btn.disabled = false; }, 2500);
                        } catch(err) {
                          // CORS 或剪貼簿 API 失敗 → fallback 複製網址
                          try { await navigator.clipboard.writeText(src); btn.textContent = _lang==="zh"?"✓ 已複製網址(fallback)":"✓ URL copied"; }
                          catch(_) { btn.textContent = uiLang==="zh"?"⎘ 複製圖片":"⎘ Copy Img"; }
                          btn.disabled = false;
                          setTimeout(()=>{ btn.textContent = uiLang==="zh"?"⎘ 複製圖片":"⎘ Copy Img"; btn.disabled = false; }, 2500);
                        }
                      };

                      return (
                        <div key={idx} className="comfy-image" style={{flexShrink:0,display:"flex",flexDirection:"column"}}>
                          <div style={{position:"relative"}}>
                            <img src={src} style={{height:450,borderRadius:"8px 8px 0 0",border:`2px solid var(--border)`,borderBottom:"none",objectFit:"contain",background:"#000",boxShadow:"0 5px 15px rgba(0,0,0,0.5)",display:"block"}} alt={`Generated ${idx+1}`} />
                            <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.75)",padding:"3px 8px",borderRadius:4,color:ac,fontSize:10,fontWeight:"bold",border:`1px solid ${ac}`}}>✓ Rendered</div>
                          </div>
                          <div style={{display:"flex",borderRadius:"0 0 8px 8px",overflow:"hidden",border:`2px solid var(--border)`,borderTop:`1px solid ${ac}40`}}>
                            <button onClick={doCopy} style={{flex:1,padding:"9px 4px",background:copiedIdx===idx?`${ac}30`:"rgba(0,0,0,0.7)",border:"none",borderRight:`1px solid ${ac}30`,color:copiedIdx===idx?ac:"var(--text)",fontSize:12,cursor:"pointer",fontWeight:700,transition:"all 0.15s"}}>
                              ⎘ Copy Img
                            </button>
                            <button onClick={doSave} style={{flex:1,padding:"9px 4px",background:"rgba(0,0,0,0.7)",border:"none",color:"var(--text)",fontSize:12,cursor:"pointer",fontWeight:700,transition:"background 0.15s"}}
                              onMouseEnter={e=>e.currentTarget.style.background=`${ac}22`}
                              onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0.7)"}
                            >{/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? uiLang==="zh"?"⬆ 分享/存圖":"⬆ Share/Save" : uiLang==="zh"?"⬇ 存檔下載":"⬇ Download"}</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </>;
    }
    const root = ReactDOM.createRoot(document.getElementById('ops-app-root'));
    root.render(<App />);
  };
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registered!', reg.scope))
        .catch(err => console.log('Service Worker registration failed:', err));
    });
  }
</script>
</body>
</html>
